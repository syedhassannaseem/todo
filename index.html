<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
            text-align: center;
        }

        header {
            background: #333;
            color: white;
            padding: 20px;
        }

        section {
            padding: 40px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website 🚀</h1>
        <p>Hosted on GitHub Pages</p>
    </header>

    <section>
        <h2>About Me</h2>
        <p>This is my first website deployed using GitHub.</p>

        <button onclick="sayHello()">Click Me</button>
    </section>

    <script>
        function sayHello() {
            alert("Hello! Your website is working 🎉");
        }
    </script>

</body>
</html>
